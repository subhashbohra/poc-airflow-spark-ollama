# airflow/helm/values.yaml
# Airflow Helm configuration — mirrors GDC enterprise pattern
# KubernetesExecutor: ephemeral pods per task, same as enterprise GDC

defaultAirflowTag: "2.11.0"
airflowVersion: "2.11.0"

# KubernetesExecutor — matches GDC: pods per task, no Celery overhead
executor: KubernetesExecutor

# Images
images:
  airflow:
    repository: apache/airflow
    tag: "2.9.2"
    pullPolicy: IfNotPresent

# Webserver
webserver:
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"
  service:
    type: ClusterIP
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "airflow"
      effect: "NoSchedule"
  nodeSelector:
    pool: airflow

# Scheduler
scheduler:
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "airflow"
      effect: "NoSchedule"
  nodeSelector:
    pool: airflow

# Workers (KubernetesExecutor — pods are ephemeral)
workers:
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "airflow"
      effect: "NoSchedule"
  nodeSelector:
    pool: airflow

# Triggerer
triggerer:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "airflow"
      effect: "NoSchedule"
  nodeSelector:
    pool: airflow

# Built-in PostgreSQL (Airflow metadata DB)
postgresql:
  enabled: true
  image:
    tag: "15"
  auth:
    postgresPassword: "airflow_poc_password"
    username: "airflow"
    password: "airflow_poc_password"
    database: "airflow"
  primary:
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"

# Redis (not needed for KubernetesExecutor, disable)
redis:
  enabled: false

# DAGs — use persistent volume for simplicity (no git-sync needed for PoC)
dags:
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: standard-rwo
    accessMode: ReadWriteMany
  gitSync:
    enabled: false

# Logs
logs:
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: standard-rwo

# Extra pip packages for workers
_pip_extra_requirements: >-
  ollama==0.1.8
  requests==2.31.0
  psycopg2-binary==2.9.9
  apache-airflow-providers-smtp==1.6.1
  apache-airflow-providers-slack==8.5.1
  apache-airflow-providers-cncf-kubernetes==8.0.0

# Airflow config overrides
config:
  core:
    dags_folder: /opt/airflow/dags
    load_examples: "False"
    parallelism: "32"
    max_active_runs_per_dag: "3"
  smtp:
    smtp_host: "smtp.gmail.com"
    smtp_starttls: "True"
    smtp_ssl: "False"
    smtp_port: "587"
    smtp_mail_from: "subhashbohra003@gmail.com"
  kubernetes_executor:
    namespace: airflow
    worker_pods_creation_batch_size: "4"
    delete_worker_pods: "True"
    delete_worker_pods_on_failure: "False"
  logging:
    logging_level: INFO
    remote_logging: "False"

# Environment variables for all pods
env:
  - name: METRICS_DB_HOST
    value: "postgres-metrics-svc.monitoring.svc.cluster.local"
  - name: METRICS_DB_PORT
    value: "5432"
  - name: METRICS_DB_NAME
    value: "metrics"
  - name: METRICS_DB_USER
    value: "metrics_user"
  - name: METRICS_DB_PASSWORD
    value: "metrics_poc_password_2024"
  - name: OLLAMA_BASE_URL
    value: "http://ollama-service.llm-serving.svc.cluster.local:11434"
  - name: OLLAMA_MODEL
    value: "gemma2:2b"
  - name: AIRFLOW_UI_URL
    value: "http://localhost:8080"

# Fernet key and webserver secret key — generated by install.sh
fernetKey: ""
webserverSecretKey: ""
