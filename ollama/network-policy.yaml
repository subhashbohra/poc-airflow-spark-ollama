---
# network-policy.yaml — Allow only airflow namespace to reach Ollama on port 11434
# All other ingress denied. Mirrors GDC air-gap isolation pattern.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-allow-airflow-only
  namespace: llm-serving
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only allow traffic from airflow namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: airflow
      ports:
        - protocol: TCP
          port: 11434
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS for model downloads (needed during model-loader phase only)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
