# spark/apps/sample-etl/sample-etl-app.yaml — Sample ETL SparkApplication
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: sample-etl
  namespace: spark-jobs
spec:
  type: Java
  mode: cluster
  image: "apache/spark:3.5.0"
  imagePullPolicy: Always
  mainClass: org.apache.spark.examples.SparkPi
  mainApplicationFile: "local:///opt/spark/examples/jars/spark-examples_2.12-3.5.0.jar"
  arguments:
    - "10"
  sparkVersion: "3.5.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "512m"
    serviceAccount: spark
    labels:
      version: "3.5.0"
    tolerations:
      - key: "pool"
        operator: "Equal"
        value: "spark"
        effect: "NoSchedule"
    nodeSelector:
      pool: spark
  executor:
    cores: 1
    instances: 2
    memory: "512m"
    labels:
      version: "3.5.0"
    tolerations:
      - key: "pool"
        operator: "Equal"
        value: "spark"
        effect: "NoSchedule"
    nodeSelector:
      pool: spark
